name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

# This explicitly gives the action permission to write to your repo
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Upgraded to v4 to clear Node.js warnings
      - uses: actions/checkout@v4
      
      # Upgraded to v3 of the snake generator
      - name: Generate Snake Animation
        uses: Platane/snk@v3
        with:
          github_user_name: KSTRamyaSri
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # Upgraded to v4 to clear Node.js warnings
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
